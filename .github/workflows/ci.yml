name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ingestor
          POSTGRES_PASSWORD: ingestor
          POSTGRES_DB: ingestor
        ports: ["5435:5432"]
        options: >-
          --health-cmd "pg_isready -U ingestor"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DSN_BD: postgresql://ingestor:ingestor@localhost:5435/ingestor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -v
